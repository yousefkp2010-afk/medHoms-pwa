name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build TWA App
        run: |
          # استخدام ملف المانفست الجاهز لمنع الأسئلة (Silent Mode)
          bubblewrap init --manifest=https://medhoms2028.netlify.app/manifest.json --directory=./ --metaData=./twa-manifest.json
          # البناء وتخطي أي تحذيرات
          bubblewrap build --accept_toast_navigation_parameters

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Medical-App-Release
          # هذا المسار حيث يضع Bubblewrap الملفات الناتجة عادةً
          path: |
            *.apk
            *.aab
            assetlinks.json
