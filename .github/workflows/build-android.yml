name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Android APK
        uses: firebelley/pwa-to-apk-action@v1.0.1
        with:
          web_url: "https://medhoms2028.netlify.app"
          manifest_url: "https://medhoms2028.netlify.app/manifest.json"
