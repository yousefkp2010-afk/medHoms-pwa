name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Android App
        uses: Bubblewrap/bubblewrap-action@v1
        with:
          # رابط موقعك ومانفستك على نتليفاي
          url: https://medhoms2028.netlify.app
          manifest: https://medhoms2028.netlify.app/manifest.json
