name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # التحديث لـ v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # التحديث لـ v4
        with:
          node-version: '20' # تحديث إصدار نود لضمان التوافق

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build TWA App
        run: |
          # تأكد من وجود ملف twa-manifest.json
          bubblewrap init --manifest=https://medhoms2028.netlify.app/manifest.json --directory=./ --metaData=./twa-manifest.json
          bubblewrap build --accept_toast_navigation_parameters

      - name: Upload APK
        uses: actions/upload-artifact@v4 # التحديث للنسخة v4 (هذا هو الحل للخطأ!)
        with:
          name: Medical-App-Release
          path: |
            *.apk
            *.aab
            assetlinks.json
