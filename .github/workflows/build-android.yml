name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Android PWA
        uses: Bubblewrap/bubblewrap-action@v1
        with:
          # نستخدم ملف المانفست الذي أنشأناه للتو
          twaManifest: twa-manifest.json
